name: Finalize CFAR tiling and limits

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'agent/guard-cfar-tiled-limits-20260710'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/guard-cfar-tiled-limits-20260710
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Merge current main and apply focused finalization
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          git merge --no-edit origin/main
          python scripts/agent_finalize_cfar_tiling.py
      - name: Validate with diagnostics
        run: |
          set +e
          status=0
          stage=install
          logfile=cfar-install.txt
          python -m pip install --upgrade pip > "$logfile" 2>&1 || status=$?
          if test "$status" = 0; then pip install -e .[dev] >> "$logfile" 2>&1 || status=$?; fi
          if test "$status" = 0; then stage=ruff_fix; logfile=cfar-ruff.txt; ruff check --fix src tests runtime_check.py > "$logfile" 2>&1 || status=$?; fi
          if test "$status" = 0; then stage=compile; logfile=cfar-compile.txt; python -m compileall -q src runtime_check.py > "$logfile" 2>&1 || status=$?; fi
          if test "$status" = 0; then stage=shell; logfile=cfar-shell.txt; bash -n install_telegram_bot.sh deploy_telegram_bot.sh > "$logfile" 2>&1 || status=$?; fi
          if test "$status" = 0; then stage=ruff; logfile=cfar-ruff.txt; ruff check src tests runtime_check.py >> "$logfile" 2>&1 || status=$?; fi
          if test "$status" = 0; then stage=pytest; logfile=cfar-pytest.txt; pytest -q > "$logfile" 2>&1 || status=$?; fi
          echo "$status" > cfar.exit
          echo "$stage" > cfar.stage
          echo "$logfile" > cfar.logfile
          test -f "$logfile" && cat "$logfile" || true
          exit 0
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cfar-finalization-diagnostics
          path: |
            cfar.exit
            cfar.stage
            cfar.logfile
            cfar-install.txt
            cfar-ruff.txt
            cfar-compile.txt
            cfar-shell.txt
            cfar-pytest.txt
          if-no-files-found: warn
          retention-days: 7
      - name: Gate
        run: test "$(cat cfar.exit)" = 0
      - name: Commit tested implementation
        run: |
          rm -f scripts/agent_finalize_cfar_tiling.py
          rm -f .github/workflows/agent-finalize-cfar-tiling.yml
          rm -f cfar.exit cfar.stage cfar.logfile cfar-install.txt cfar-ruff.txt cfar-compile.txt cfar-shell.txt cfar-pytest.txt
          git add -A
          if git diff --cached --quiet; then
            echo 'No finalization changes found.' >&2
            exit 1
          fi
          git commit -m 'Finalize guard-cell CFAR, tiled inference and limits'
          git push origin HEAD:agent/guard-cfar-tiled-limits-20260710
