name: Finalize retry-safe deployment

on:
  push:
    branches:
      - agent/retry-safe-deploy-20260710

permissions:
  contents: write
  pull-requests: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/retry-safe-deploy-20260710
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply migration
        run: python scripts/agent_retry_safe_deploy.py
      - name: Install and validate
        run: |
          set -o pipefail
          python -m pip install --upgrade pip
          pip install -e .[dev]
          ruff check --fix src tests runtime_check.py
          python -m compileall -q src runtime_check.py
          bash -n install_telegram_bot.sh deploy_telegram_bot.sh
          ruff check src tests runtime_check.py
          pytest -q
      - name: Commit tested implementation
        run: |
          rm -f scripts/agent_retry_safe_deploy.py
          rm -f .github/workflows/agent-retry-safe-deploy.yml
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if git diff --cached --quiet; then
            echo 'No generated changes found.' >&2
            exit 1
          fi
          git commit -m 'Make immutable deployments retry-safe'
          git push origin HEAD:agent/retry-safe-deploy-20260710
      - name: Publish diagnostics
        if: failure()
        run: |
          gh pr comment 26 --body 'Retry-safe deployment finalization failed. Inspect this workflow run for the exact migration, lint or test stage.' || true
