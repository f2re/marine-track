name: Finalize PR 29 live canary

on:
  push:
    branches:
      - main
    paths:
      - ops/.finalize-pr29

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  validate-merge-cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/live-s1-canary-selftest-20260711
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Materialize integration if still pending
        run: |
          set -Eeuo pipefail
          if test -f scripts/apply_live_s1_canary.py; then
            python scripts/apply_live_s1_canary.py
          fi
          python - <<'PY'
          from pathlib import Path

          path = Path('tests/test_provider_canary.py')
          if path.is_file():
              text = path.read_text(encoding='utf-8')
              text = text.replace(
                  '    assert result.report["status"] == "success"\n',
                  '    assert result.report["status"] == "success", result.report\n',
              )
              path.write_text(text, encoding='utf-8')
          PY
      - name: Install package
        run: |
          set -o pipefail
          python -m pip install --upgrade pip 2>&1 | tee /tmp/pr29-install.log
          pip install -e .[dev] 2>&1 | tee -a /tmp/pr29-install.log
      - name: Validate exact source tree
        run: |
          set -Eeuo pipefail
          ruff check --fix src tests runtime_check.py 2>&1 | tee /tmp/pr29-ruff-fix.log
          python -m compileall -q src runtime_check.py 2>&1 | tee /tmp/pr29-compile.log
          bash -n install_telegram_bot.sh deploy_telegram_bot.sh 2>&1 | tee /tmp/pr29-shell.log
          ruff check src tests runtime_check.py 2>&1 | tee /tmp/pr29-ruff.log
          pytest -q 2>&1 | tee /tmp/pr29-pytest.log
      - name: Commit clean PR source
        run: |
          set -Eeuo pipefail
          rm -f scripts/apply_live_s1_canary.py
          rm -f .github/workflows/agent-finalize-live-s1-canary.yml
          rm -f .github/workflows/agent-finalize-live-s1-canary-v2.yml
          rm -f .github/workflows/agent-materialize-live-canary-source.yml
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git diff --cached --check
          if ! git diff --cached --quiet; then
            git commit -m 'Finalize live Sentinel-1 canary and administrator self-test'
            git push origin HEAD:agent/live-s1-canary-selftest-20260711
          fi
          test -z "$(git ls-files | grep -E '(apply_live_s1_canary|agent-(finalize|materialize)-live)' || true)"
          echo "PR_HEAD=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
      - name: Merge validated PR
        run: |
          set -Eeuo pipefail
          gh api \
            --method PUT \
            -H 'Accept: application/vnd.github+json' \
            /repos/f2re/marine-track/pulls/29/merge \
            -f merge_method=squash \
            -f sha="$PR_HEAD" \
            --jq '.merged'
      - name: Clean one-shot main orchestration
        run: |
          set -Eeuo pipefail
          sleep 3
          git fetch origin main
          git checkout -B main origin/main
          rm -f .github/workflows/ops-finalize-pr29.yml
          rm -f ops/.finalize-pr29
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Remove one-shot PR 29 merge gate'
          git push origin main
      - name: Publish diagnostics
        if: failure()
        run: |
          {
            echo 'PR 29 validation/merge gate failed.'
            for file in /tmp/pr29-ruff-fix.log /tmp/pr29-compile.log /tmp/pr29-shell.log /tmp/pr29-ruff.log /tmp/pr29-pytest.log; do
              if test -f "$file"; then
                echo
                echo "### $(basename "$file")"
                tail -n 350 "$file"
              fi
            done
          } > /tmp/pr29-diagnostics.md
          gh pr comment 29 --body-file /tmp/pr29-diagnostics.md || true
