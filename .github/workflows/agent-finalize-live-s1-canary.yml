name: Finalize live Sentinel-1 canary

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  finalize:
    if: github.head_ref == 'agent/live-s1-canary-selftest-20260711'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/live-s1-canary-selftest-20260711
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply reviewed integration
        run: |
          set -Eeuo pipefail
          python scripts/apply_live_s1_canary.py
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Validate implementation
        run: |
          set -Eeuo pipefail
          ruff check --fix src tests runtime_check.py
          python -m compileall -q src runtime_check.py
          bash -n install_telegram_bot.sh deploy_telegram_bot.sh
          ruff check src tests runtime_check.py
          pytest -q
      - name: Commit clean source diff
        run: |
          set -Eeuo pipefail
          rm -f scripts/apply_live_s1_canary.py
          rm -f .github/workflows/agent-finalize-live-s1-canary.yml
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git diff --cached --check
          test -n "$(git diff --cached --name-only -- src tests docs runtime_check.py .env.example)"
          test -z "$(git diff --cached --name-only | grep -E '(apply_live_s1_canary|agent-finalize-live-s1-canary)' || true)"
          git commit -m 'Add live Sentinel-1 canary and administrator self-test'
          git push origin HEAD:agent/live-s1-canary-selftest-20260711
      - name: Publish failure diagnostics
        if: failure()
        run: |
          {
            echo 'Live Sentinel-1 canary finalization failed.'
            echo
            echo '```text'
            git status --short || true
            echo '```'
          } > /tmp/canary-diagnostics.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/canary-diagnostics.md || true
