name: Agent security hardening

on:
  push:
    branches:
      - agent/security-cache-hardening-20260710

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/security-cache-hardening-20260710
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply migration
        run: python scripts/agent_security_hardening.py
      - name: Format imports
        run: |
          python -m pip install 'ruff>=0.5'
          ruff check --select I --fix src tests runtime_check.py
      - name: Commit generated changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add . ':!scripts/agent_security_hardening.py' ':!.github/workflows/agent-security-hardening.yml'
          if git diff --cached --quiet; then
            echo 'No generated changes.'
            exit 0
          fi
          git commit -m 'Harden Telegram access, scene tokens and search cache'
          git push origin HEAD:agent/security-cache-hardening-20260710
# trigger: 2
