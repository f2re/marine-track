name: Fix resource limit mapping validation

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'agent/guard-cfar-tiled-limits-20260710'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/guard-cfar-tiled-limits-20260710
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply fail-closed mapping repairs
        run: |
          python - <<'PY'
          from pathlib import Path

          resource = Path('src/marine_track/resource_limits.py')
          text = resource.read_text(encoding='utf-8')
          old = '''    configured = payload.get("resource_limits") or {}
              if not isinstance(configured, dict):
                  raise ResourceLimitError(f"resource_limits must be a mapping: {resolved}")
              return configured
          '''.replace('          ', '')
          new = '''    configured = payload.get("resource_limits")
              if configured is None:
                  return {}
              if not isinstance(configured, dict):
                  raise ResourceLimitError(f"resource_limits must be a mapping: {resolved}")
              return configured
          '''.replace('          ', '')
          if old not in text:
              raise SystemExit('resource_limits mapping marker not found')
          resource.write_text(text.replace(old, new, 1), encoding='utf-8')

          processing = Path('src/marine_track/processing_config.py')
          text = processing.read_text(encoding='utf-8')
          old = '''    limits_root = payload.get("resource_limits") or {}
              if not isinstance(limits_root, dict):
                  raise ValueError("resource_limits must be a mapping")
          '''.replace('          ', '')
          new = '''    limits_root = payload.get("resource_limits")
              if limits_root is None:
                  limits_root = {}
              elif not isinstance(limits_root, dict):
                  raise ValueError("resource_limits must be a mapping")
          '''.replace('          ', '')
          if old not in text:
              raise SystemExit('processing_config mapping marker not found')
          processing.write_text(text.replace(old, new, 1), encoding='utf-8')

          tests = Path('tests/test_cfar_tiling_limits.py')
          text = tests.read_text(encoding='utf-8')
          fixture_old = '    config.write_text("resource_limits: []\\n", encoding="utf-8")\n'
          fixture_new = '''    config.write_text(
                  "ship_detection:\\n  sar: {}\\nresource_limits: []\\n",
                  encoding="utf-8",
              )
          '''.replace('          ', '')
          if fixture_old not in text:
              raise SystemExit('malformed resource limit fixture marker not found')
          text = text.replace(fixture_old, fixture_new, 1)
          old = '''    with pytest.raises(ResourceLimitError, match="resource_limits must be a mapping"):
                  load_resource_limits()
          '''.replace('          ', '')
          new = '''    with pytest.raises(ResourceLimitError, match="resource_limits must be a mapping"):
                  load_resource_limits()
              with pytest.raises(ValueError, match="resource_limits must be a mapping"):
                  load_effective_detector_config(Sensor.SENTINEL1, path=config)
          '''.replace('          ', '')
          if old not in text:
              raise SystemExit('malformed resource limit test marker not found')
          tests.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Validate with diagnostics
        run: |
          set +e
          status=0
          stage=install
          logfile=limits-install.txt
          python -m pip install --upgrade pip > "$logfile" 2>&1 || status=$?
          if test "$status" = 0; then pip install -e .[dev] >> "$logfile" 2>&1 || status=$?; fi
          if test "$status" = 0; then stage=ruff_fix; logfile=limits-ruff.txt; ruff check --fix src tests runtime_check.py > "$logfile" 2>&1 || status=$?; fi
          if test "$status" = 0; then stage=compile; logfile=limits-compile.txt; python -m compileall -q src runtime_check.py > "$logfile" 2>&1 || status=$?; fi
          if test "$status" = 0; then stage=shell; logfile=limits-shell.txt; bash -n install_telegram_bot.sh deploy_telegram_bot.sh > "$logfile" 2>&1 || status=$?; fi
          if test "$status" = 0; then stage=ruff; logfile=limits-ruff.txt; ruff check src tests runtime_check.py >> "$logfile" 2>&1 || status=$?; fi
          if test "$status" = 0; then stage=pytest; logfile=limits-pytest.txt; pytest -q > "$logfile" 2>&1 || status=$?; fi
          echo "$status" > limits.exit
          echo "$stage" > limits.stage
          echo "$logfile" > limits.logfile
          test -f "$logfile" && cat "$logfile" || true
          exit 0
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resource-limit-repair-diagnostics
          path: |
            limits.exit
            limits.stage
            limits.logfile
            limits-install.txt
            limits-ruff.txt
            limits-compile.txt
            limits-shell.txt
            limits-pytest.txt
          if-no-files-found: warn
          retention-days: 7
      - name: Gate
        run: test "$(cat limits.exit)" = 0
      - name: Commit tested repair
        run: |
          rm -f .github/workflows/agent-fix-resource-limit-mapping.yml
          rm -f limits.exit limits.stage limits.logfile limits-install.txt limits-ruff.txt limits-compile.txt limits-shell.txt limits-pytest.txt
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Fail closed on malformed resource limit mappings'
          git push origin HEAD:agent/guard-cfar-tiled-limits-20260710
