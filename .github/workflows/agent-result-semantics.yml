name: Agent result semantics migration

on:
  push:
    branches:
      - agent/result-semantics-ais-qc-20260710

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/result-semantics-ais-qc-20260710
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply migration
        run: python scripts/agent_finish_result_semantics.py
      - name: Format imports
        run: |
          python -m pip install 'ruff>=0.5'
          ruff check --select I --fix src tests runtime_check.py
      - name: Commit generated changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add . ':!scripts/agent_finish_result_semantics.py' ':!.github/workflows/agent-result-semantics.yml'
          if git diff --cached --quiet; then
            echo 'No generated changes.'
            exit 0
          fi
          git commit -m 'Finish candidate result semantics and AIS QC integration'
          git push origin HEAD:agent/result-semantics-ais-qc-20260710
