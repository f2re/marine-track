name: Phase2 import autofix

on:
  push:
    branches:
      - agent/calibration-phase2-20260710

permissions:
  contents: write

jobs:
  fix-imports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/calibration-phase2-20260710
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Ruff
        run: python -m pip install 'ruff>=0.5'
      - name: Apply import fixes
        run: ruff check --select I --fix src/marine_track/telegram_calibration.py
      - name: Commit fixes
        run: |
          if git diff --quiet; then
            echo 'No import changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/marine_track/telegram_calibration.py
          git commit -m 'Fix phase 2 import ordering'
          git push origin HEAD:agent/calibration-phase2-20260710
