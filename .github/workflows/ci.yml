name: CI

on:
  push:
    branches:
      - main
      - 'agent/**'
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Compile
        run: python -m compileall -q src runtime_check.py
      - name: Shell syntax
        run: bash -n install_telegram_bot.sh deploy_telegram_bot.sh
      - name: Lint
        run: |
          set +e
          ruff check src tests runtime_check.py > ruff.txt 2>&1
          status=$?
          echo "$status" > ruff.exit
          cat ruff.txt
          exit 0
      - name: Test
        run: |
          set +e
          pytest -q > pytest.txt 2>&1
          status=$?
          echo "$status" > pytest.exit
          cat pytest.txt
          exit 0
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics
          path: |
            ruff.txt
            ruff.exit
            pytest.txt
            pytest.exit
          if-no-files-found: error
          retention-days: 7
      - name: Gate
        if: always()
        run: |
          test "$(cat ruff.exit)" = "0"
          test "$(cat pytest.exit)" = "0"

  finalize-operational-s1:
    if: github.event_name == 'push' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/operational-s1-preprocessing-20260710
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply reviewed implementation
        run: |
          set -Eeuo pipefail
          for patch in \
            scripts/.operational-s1-01-config-runtime.patch \
            scripts/.operational-s1-02-processing-pipeline.patch \
            scripts/.operational-s1-03-materialization.patch \
            scripts/.operational-s1-04-explicit-source.patch
          do
            echo "Applying $patch"
            git apply --3way "$patch"
          done
          python scripts/repair_operational_s1.py
          if git grep -nE '^(<<<<<<<|=======|>>>>>>>)' -- . ':!scripts/.operational-s1-*'; then
            echo 'Merge conflict markers remain.' >&2
            exit 1
          fi
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Validate implementation
        run: |
          set -Eeuo pipefail
          ruff check --fix src tests runtime_check.py
          python -m compileall -q src runtime_check.py
          bash -n install_telegram_bot.sh deploy_telegram_bot.sh
          ruff check src tests runtime_check.py
          pytest -q
      - name: Commit clean source diff
        run: |
          set -Eeuo pipefail
          git show c6e813804c9cdd277069b422c2e1531583d9d84b:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm -f .github/workflows/agent-finalize-operational-s1.yml
          rm -f scripts/.operational-s1-*.patch
          rm -f scripts/.ops1.payload.* scripts/.operational-s1-overlay.*
          rm -f scripts/repair_operational_s1.py
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git diff --cached --check
          test -n "$(git diff --cached --name-only -- src tests config docs runtime_check.py .env.example)"
          test -z "$(git diff --cached --name-only | grep -E '(^scripts/\.operational-s1|^\.github/workflows/agent-finalize-operational-s1|repair_operational_s1)' || true)"
          git commit -m 'Operationalize Sentinel-1 preprocessing and materialization safety'
          git push origin HEAD:agent/operational-s1-preprocessing-20260710
      - name: Publish failure diagnostics
        if: failure()
        run: |
          {
            echo 'Operational Sentinel-1 source finalization failed.'
            echo
            echo '```text'
            git status --short || true
            echo '```'
          } > /tmp/ops1-finalize.md
          gh pr comment 24 --body-file /tmp/ops1-finalize.md || true
