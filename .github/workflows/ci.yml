name: CI

on:
  push:
    branches:
      - main
      - 'agent/**'
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Compile
        run: python -m compileall -q src runtime_check.py
      - name: Lint
        run: ruff check src tests runtime_check.py
      - name: Test
        run: pytest -q
