name: Finalize typed asset implementation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/typed-assets-cdse-20260710
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply and validate
        run: |
          set +e
          status=0
          stage=migration
          logfile=typed-migration.txt
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          python scripts/agent_typed_assets_cdse.py > "$logfile" 2>&1 || status=$?
          if test "$status" = 0; then
            stage=repair
            logfile=typed-repair.txt
            python - <<'PY' > "$logfile" 2>&1
          from pathlib import Path

          materializer = Path('src/marine_track/scene_materializer.py')
          text = materializer.read_text(encoding='utf-8')
          text = text.replace(
              '        headers=headers,\n    )\n    return MaterializedScene(',
              '        headers=headers,\n        return_probe=True,\n    )\n    return MaterializedScene(',
              1,
          )
          text = text.replace(
              '    headers: dict[str, str] | None = None,\n) -> tuple[Path, bool, bool, AssetProbe]:\n',
              '    headers: dict[str, str] | None = None,\n    return_probe: bool = False,\n) -> tuple[Path, bool, bool] | tuple[Path, bool, bool, AssetProbe]:\n',
              1,
          )
          text = text.replace(
              '        return target, aoi_geojson is not None, True, probe\n',
              '        result = (target, aoi_geojson is not None, True)\n        return (*result, probe) if return_probe else result\n',
              1,
          )
          text = text.replace(
              '        return target, True, False, probe\n',
              '        result = (target, True, False)\n        return (*result, probe) if return_probe else result\n',
              1,
          )
          text = text.replace(
              '        return target, False, False, probe\n',
              '        result = (target, False, False)\n        return (*result, probe) if return_probe else result\n',
          )
          text = text.replace(
              '    return "\n".join(f"{key}: {value}" for key, value in headers.items())\n',
              '    return "\\n".join(f"{key}: {value}" for key, value in headers.items())\n',
              1,
          )
          materializer.write_text(text, encoding='utf-8')
          raw = materializer.read_bytes()
          materializer.write_bytes(raw.replace(bytes([0]), bytes([92, 120, 48, 48])))

          assets = Path('src/marine_track/assets.py')
          text = assets.read_text(encoding='utf-8')
          text = text.replace('                    href=sanitize_url(href),\n', '                    href=href,\n', 1)
          old = '        for record in iter_asset_records(scenes):\n            writer.writerow(record.__dict__)\n'
          new = (
              '        for record in iter_asset_records(scenes):\n'
              '            row = dict(record.__dict__)\n'
              '            row["href"] = sanitize_url(str(row["href"]))\n'
              '            writer.writerow(row)\n'
          )
          if old in text:
              text = text.replace(old, new, 1)
          assets.write_text(text, encoding='utf-8')
          PY
            status=$?
          fi
          if test "$status" = 0; then stage=install; logfile=typed-install.txt; python -m pip install --upgrade pip > "$logfile" 2>&1 || status=$?; fi
          if test "$status" = 0; then pip install -e .[dev] >> "$logfile" 2>&1 || status=$?; fi
          if test "$status" = 0; then stage=ruff_fix; logfile=typed-ruff.txt; ruff check --fix src tests runtime_check.py > "$logfile" 2>&1 || status=$?; fi
          if test "$status" = 0; then stage=compile; logfile=typed-compile.txt; python -m compileall -q src runtime_check.py > "$logfile" 2>&1 || status=$?; fi
          if test "$status" = 0; then stage=ruff; logfile=typed-ruff.txt; ruff check src tests runtime_check.py >> "$logfile" 2>&1 || status=$?; fi
          if test "$status" = 0; then stage=pytest; logfile=typed-pytest.txt; pytest -q > "$logfile" 2>&1 || status=$?; fi
          echo "$status" > typed.exit
          echo "$stage" > typed.stage
          echo "$logfile" > typed.logfile
          test -f "$logfile" && cat "$logfile" || true
          exit 0
      - name: Publish failure diagnostics
        if: always()
        run: |
          if test "$(cat typed.exit)" != 0; then
            stage="$(cat typed.stage)"
            logfile="$(cat typed.logfile)"
            {
              echo "Typed asset finalization failed at stage: $stage"
              echo
              echo "### $logfile"
              test -f "$logfile" && tail -n 250 "$logfile" || true
            } > typed-diagnostics.txt
            gh pr comment 12 --body-file typed-diagnostics.txt || true
          fi
      - name: Gate
        run: test "$(cat typed.exit)" = 0
      - name: Commit tested implementation
        run: |
          git checkout HEAD -- .github/workflows/ci.yml
          rm -f scripts/agent_typed_assets_cdse.py
          rm -f typed.exit typed.stage typed.logfile typed-migration.txt typed-repair.txt typed-install.txt typed-compile.txt typed-ruff.txt typed-pytest.txt typed-diagnostics.txt
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if git diff --cached --quiet; then
            echo 'No generated implementation changes found.' >&2
            exit 1
          fi
          git commit -m 'Implement typed assets and authenticated CDSE materialization'
          git push origin HEAD:agent/typed-assets-cdse-20260710
