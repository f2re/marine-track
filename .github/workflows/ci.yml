name: CI

on:
  push:
    branches:
      - main
      - 'agent/**'
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Compile
        run: python -m compileall -q src runtime_check.py
      - name: Shell syntax
        run: bash -n install_telegram_bot.sh deploy_telegram_bot.sh
      - name: Lint
        run: |
          set +e
          ruff check src tests runtime_check.py > ruff.txt 2>&1
          status=$?
          echo "$status" > ruff.exit
          cat ruff.txt
          exit 0
      - name: Test
        run: |
          set +e
          python -m pytest -q > pytest.txt 2>&1
          status=$?
          echo "$status" > pytest.exit
          cat pytest.txt
          exit 0
      - name: Type check without baseline growth
        run: |
          git fetch --no-tags --depth=1 origin main:refs/remotes/origin/main
          git worktree prune
          rm -rf /tmp/marine-track-main
          git worktree add --detach /tmp/marine-track-main refs/remotes/origin/main
          set +e
          (
            cd /tmp/marine-track-main
            mypy --config-file "$GITHUB_WORKSPACE/pyproject.toml" --no-incremental src
          ) > "$GITHUB_WORKSPACE/mypy-main.txt" 2>&1
          echo "$?" > "$GITHUB_WORKSPACE/mypy-main.exit"
          mypy --no-incremental src > mypy.txt 2>&1
          echo "$?" > mypy-current.exit
          python scripts/check_mypy_no_growth.py \
            --baseline mypy-main.txt \
            --current mypy.txt > mypy-baseline.txt 2>&1
          status=$?
          echo "$status" > mypy.exit
          cat mypy-main.txt
          cat mypy.txt
          cat mypy-baseline.txt
          exit 0
      - name: Package build
        run: |
          set +e
          python -m build > build.txt 2>&1
          status=$?
          echo "$status" > build.exit
          cat build.txt
          exit 0
      - name: Runtime check
        env:
          MARINE_TRACK_PROVIDER_PROFILE: core
          TELEGRAM_BOT_TOKEN: ci-placeholder
          TELEGRAM_ADMIN_IDS: '1'
          MARINE_TRACK_OUTPUT_DIR: runs/ci-telegram
          MARINE_TRACK_CACHE_DIR: runs/ci-cache
        run: |
          set +e
          python runtime_check.py > runtime-check.txt 2>&1
          status=$?
          echo "$status" > runtime-check.exit
          cat runtime-check.txt
          exit 0
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics
          path: |
            ruff.txt
            ruff.exit
            pytest.txt
            pytest.exit
            mypy-main.txt
            mypy-main.exit
            mypy.txt
            mypy-current.exit
            mypy-baseline.txt
            mypy.exit
            build.txt
            build.exit
            runtime-check.txt
            runtime-check.exit
          if-no-files-found: error
          retention-days: 7
      - name: Gate
        if: always()
        run: |
          test "$(cat ruff.exit)" = "0"
          test "$(cat pytest.exit)" = "0"
          test "$(cat mypy.exit)" = "0"
          test "$(cat build.exit)" = "0"
          test "$(cat runtime-check.exit)" = "0"
