name: CI

on:
  push:
    branches:
      - main
      - 'agent/**'
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Compile
        run: python -m compileall -q src runtime_check.py
      - name: Shell syntax
        run: bash -n install_telegram_bot.sh deploy_telegram_bot.sh
      - name: Lint
        run: |
          set +e
          ruff check src tests runtime_check.py > ruff.txt 2>&1
          status=$?
          echo "$status" > ruff.exit
          cat ruff.txt
          exit 0
      - name: Test
        run: |
          set +e
          pytest -q > pytest.txt 2>&1
          status=$?
          echo "$status" > pytest.exit
          cat pytest.txt
          exit 0
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics
          path: |
            ruff.txt
            ruff.exit
            pytest.txt
            pytest.exit
          if-no-files-found: error
          retention-days: 7
      - name: Gate
        if: always()
        run: |
          test "$(cat ruff.exit)" = "0"
          test "$(cat pytest.exit)" = "0"

  finalize-operational-s1:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/operational-s1-preprocessing-20260710'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/operational-s1-preprocessing-20260710
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply and validate
        run: |
          set +e
          status=0
          stage=apply
          logfile=/tmp/ops1-apply.log
          for patch in \
            scripts/.operational-s1-01-config-runtime.patch \
            scripts/.operational-s1-02-processing-pipeline.patch \
            scripts/.operational-s1-03-materialization.patch \
            scripts/.operational-s1-04-explicit-source.patch
          do
            if test "$status" = 0; then
              echo "Applying $patch" >> "$logfile"
              git apply --3way "$patch" >> "$logfile" 2>&1 || status=$?
            fi
          done
          if test "$status" = 0; then
            git grep -nE '^(<<<<<<<|=======|>>>>>>>)' -- . ':!scripts/.operational-s1-*' >> "$logfile" 2>&1 && status=1
          fi
          if test "$status" = 0; then
            stage=repair
            logfile=/tmp/ops1-repair.log
            python - <<'PY' > "$logfile" 2>&1 || status=$?
          from pathlib import Path

          path = Path('src/marine_track/scene_materializer.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              'from contextlib import contextmanager, nullcontext\n',
              'from contextlib import contextmanager, nullcontext, suppress\n',
              1,
          )
          text = text.replace(
              '''                try:
                    os.utime(lock_path, None)
                except OSError:
                    pass
                break
            except BlockingIOError:
                if time.monotonic() >= deadline:
                    raise MaterializationError(
                        f"Timed out waiting for raster cache lock: {target.name}"
                    )
''',
              '''                with suppress(OSError):
                    os.utime(lock_path, None)
                break
            except BlockingIOError as exc:
                if time.monotonic() >= deadline:
                    raise MaterializationError(
                        f"Timed out waiting for raster cache lock: {target.name}"
                    ) from exc
''',
              1,
          )
          path.write_text(text, encoding='utf-8')
          PY
          fi
          if test "$status" = 0; then
            stage=install
            logfile=/tmp/ops1-install.log
            python -m pip install --upgrade pip > "$logfile" 2>&1 || status=$?
          fi
          if test "$status" = 0; then
            pip install -e .[dev] >> "$logfile" 2>&1 || status=$?
          fi
          if test "$status" = 0; then
            stage=ruff_fix
            logfile=/tmp/ops1-ruff-fix.log
            ruff check --fix src tests runtime_check.py > "$logfile" 2>&1 || status=$?
          fi
          if test "$status" = 0; then
            stage=compile
            logfile=/tmp/ops1-compile.log
            python -m compileall -q src runtime_check.py > "$logfile" 2>&1 || status=$?
          fi
          if test "$status" = 0; then
            stage=shell
            logfile=/tmp/ops1-shell.log
            bash -n install_telegram_bot.sh deploy_telegram_bot.sh > "$logfile" 2>&1 || status=$?
          fi
          if test "$status" = 0; then
            stage=ruff
            logfile=/tmp/ops1-ruff.log
            ruff check src tests runtime_check.py > "$logfile" 2>&1 || status=$?
          fi
          if test "$status" = 0; then
            stage=pytest
            logfile=/tmp/ops1-pytest.log
            pytest -q > "$logfile" 2>&1 || status=$?
          fi
          echo "$status" > /tmp/ops1.status
          echo "$stage" > /tmp/ops1.stage
          echo "$logfile" > /tmp/ops1.logfile
          test -f "$logfile" && cat "$logfile" || true
          exit 0
      - name: Publish diagnostics
        if: always()
        run: |
          if test "$(cat /tmp/ops1.status)" != 0; then
            stage="$(cat /tmp/ops1.stage)"
            logfile="$(cat /tmp/ops1.logfile)"
            {
              echo "Operational Sentinel-1 finalization failed at stage: $stage"
              echo
              echo '```text'
              test -f "$logfile" && tail -n 300 "$logfile" || true
              echo
              git status --short || true
              echo '```'
            } > /tmp/ops1-diagnostics.md
            gh pr comment 24 --body-file /tmp/ops1-diagnostics.md || true
          fi
      - name: Gate
        run: test "$(cat /tmp/ops1.status)" = 0
      - name: Commit tested implementation
        run: |
          set -Eeuo pipefail
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm -f .github/workflows/agent-finalize-operational-s1.yml
          rm -f scripts/.operational-s1-*.patch
          rm -f scripts/.ops1.payload.* scripts/.operational-s1-overlay.*
          git add -A
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git diff --cached --check
          test -n "$(git diff --cached --name-only -- src tests config docs runtime_check.py .env.example)"
          git commit -m 'Operationalize Sentinel-1 preprocessing and materialization safety'
          git push origin HEAD:agent/operational-s1-preprocessing-20260710
